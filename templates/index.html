<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Spotify Mini Clone</title>
<link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>

<!-- ===================== AUTH GATE (full screen, blocks app until logged in) ===================== -->
<div id="authGate" class="auth-gate">
  <div class="auth-gate-box">
    <h1 class="logo">🎧 MiniPlay</h1>
    <h2 id="authGateTitle">Log in to continue</h2>

    <div id="authError" class="auth-error hidden"></div>

    <input id="authUsername" type="text" placeholder="Username">
    <input id="authEmail" type="email" placeholder="Email" class="hidden">
    <input id="authPassword" type="password" placeholder="Password">

    <button id="authSubmitBtn">Log in</button>
    <p class="auth-switch">
      <span id="authSwitchText">Don't have an account?</span>
      <a href="#" id="authSwitchLink">Sign up</a>
    </p>
  </div>
</div>

<!-- ===================== MAIN APP (hidden until logged in) ===================== -->
<div class="app hidden" id="appRoot">

  <aside class="sidebar">
    <h1 class="logo">🎧 MiniPlay</h1>

    <nav class="nav-menu">
      <div class="nav-item active" data-view="home">🏠 Home</div>
      <div class="nav-item" data-view="genres">🎼 Genres</div>
      <div class="nav-item" data-view="albums">💿 Albums</div>
    </nav>

    <input id="searchBox" type="text" placeholder="Search songs or artists...">
    <div id="searchResults" class="song-list"></div>

    <div class="playlists-section">
      <div class="playlists-header">
        <h3>My Playlists</h3>
        <button id="newPlaylistBtn">+ New</button>
      </div>
      <div id="playlistList" class="playlist-list"></div>
    </div>

    <!-- user menu pinned to bottom of sidebar -->
    <div class="user-menu" id="userMenu">
      <div class="user-menu-trigger" id="userMenuTrigger">
        <span class="avatar" id="userAvatar"></span>
        <span id="userMenuName"></span>
        <span class="chevron">▾</span>
      </div>
      <div class="user-menu-dropdown hidden" id="userMenuDropdown">
        <button id="logoutBtn">Log out</button>
      </div>
    </div>
  </aside>

  <main class="main">

    <!-- HOME VIEW -->
    <div id="view-home" class="view">
      <div id="playlistView" class="playlist-view hidden">
        <div class="playlist-view-header">
          <h2 id="playlistViewTitle"></h2>
          <button id="closePlaylistViewBtn">✕ Close</button>
        </div>
        <div id="playlistViewSongs" class="song-list"></div>
      </div>

      <h2>All Songs</h2>
      <div id="songList" class="song-list"></div>

      <h2>Recommended (same artist)</h2>
      <div id="recList" class="song-list"></div>
    </div>

    <!-- GENRES VIEW -->
    <div id="view-genres" class="view hidden">
      <div id="genreDetail" class="detail-header hidden">
        <button class="backBtn" id="backFromGenre">← Back to Genres</button>
        <h2 id="genreDetailTitle"></h2>
        <div id="genreSongs" class="song-list"></div>
      </div>
      <div id="genreGridWrap">
        <h2>Browse Genres</h2>
        <div id="genreGrid" class="tile-grid"></div>
      </div>
    </div>

    <!-- ALBUMS VIEW -->
    <div id="view-albums" class="view hidden">
      <div id="albumDetail" class="detail-header hidden">
        <button class="backBtn" id="backFromAlbum">← Back to Albums</button>
        <h2 id="albumDetailTitle"></h2>
        <div id="albumDetailArtist" class="dim"></div>
        <div id="albumSongs" class="album-grouped"></div>
      </div>
      <div id="albumGridWrap">
        <h2>Browse Albums</h2>
        <div id="albumGrid" class="tile-grid"></div>
      </div>
    </div>

  </main>
</div>

<footer class="player-bar hidden" id="playerBar">
  <div class="now-playing">
    <img id="nowCover" src="" alt="">
    <div>
      <div id="nowTitle">No song playing</div>
      <div id="nowArtist" class="dim"></div>
    </div>
  </div>

  <div class="controls">
    <button id="playPauseBtn">▶</button>
    <span id="curTime">0:00</span>
    <input id="seekBar" type="range" min="0" max="100" value="0">
    <span id="durTime">0:00</span>
  </div>

  <div class="volume">
    🔊 <input id="volumeBar" type="range" min="0" max="100" value="80">
  </div>
</footer>

<audio id="audioPlayer"></audio>

<!-- add-to-playlist popup (positioned dynamically near the clicked + button) -->
<div id="addToPlaylistMenu" class="add-to-playlist-menu hidden"></div>

<script src="{{ url_for('static', filename='js/app.js') }}"></script>
</body>
</html>
